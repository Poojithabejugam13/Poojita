<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-50/95 px-4 backdrop-blur-sm">
    <div
        class="max-w-md w-full bg-white rounded-3xl shadow-2xl shadow-primary-plum/10 p-10 text-center animation-fade-in border border-gray-100">
        <!-- Error Icon -->
        <div class="mx-auto w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-8">
            <svg class="w-12 h-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h1 class="text-3xl font-black text-primary-plum mb-4 tracking-tight">System Notice</h1>
        <p class="text-gray-500 font-medium mb-10 leading-relaxed px-2">
            {{ message }}
        </p>

        <div class="space-y-3">
            <a [routerLink]="getBackRoute()"
                class="block w-full px-6 py-4 rounded-2xl bg-primary-plum text-white font-bold text-sm hover:bg-secondary-maroon transition-all shadow-xl shadow-primary-plum/20 active:scale-95">
                {{ getBackLabel() }}
            </a>
            <button onclick="window.location.reload()"
                class="block w-full px-6 py-4 rounded-2xl bg-gray-50 text-primary-plum font-bold text-sm hover:bg-gray-100 transition-all active:scale-95 border border-gray-200">
                Try Refreshing
            </button>
        </div>

        <p class="mt-10 text-xs text-gray-400 font-medium border-t border-gray-100 pt-6">
            Contact assistance if this problem continues. Ref: <strong>SVC-1001</strong>
        </p>
    </div>
</div>
