<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative bg-gray-50 z-0">

    <div class="absolute inset-0 z-[-1] bg-bg-blush/40 clip-path-diagonal"></div>

    <div class="max-w-md w-full card shadow-2xl bg-white border-0 z-10 relative">

        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-bg-blush rounded-full flex items-center justify-center shadow-inner mb-4">
                <svg class="w-8 h-8 text-primary-plum" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-primary-plum">Sign In</h2>
            <p class="text-gray-500 mt-2 font-medium text-sm">Welcome back to Hartford Insurance.</p>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage"
            class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm font-medium text-center">
            {{ errorMessage }}
        </div>

        <form class="space-y-6" (ngSubmit)="onSubmit()">

            <div>
                <label class="label-text">Email address</label>
                <input name="email" type="email" autocomplete="email" required [(ngModel)]="email" class="input-field"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="label-text">Password</label>
                <input name="password" type="password" autocomplete="current-password" required [(ngModel)]="password"
                    class="input-field" placeholder="••••••••">
            </div>

            <div>
                <app-captcha (onVerified)="isCaptchaVerified = $event"></app-captcha>
            </div>

            <div>
                <button type="submit" class="w-full btn-primary text-lg shadow-lg">Sign In</button>
            </div>

        </form>
    </div>
</div>

<style>
    .clip-path-diagonal {
        clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
    }
</style>
