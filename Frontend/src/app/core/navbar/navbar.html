<nav class="bg-primary-plum text-white shadow-md fixed w-full z-50 top-0 left-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">

            <!-- Logo -->
            <div class="flex items-center">
                <a routerLink="/"
                    class="flex-shrink-0 flex items-center gap-2 cursor-pointer text-white hover:text-bg-blush transition-colors">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                        </path>
                    </svg>
                    <span class="font-bold text-xl tracking-wide hidden sm:block">Hartford Health Assure</span>
                </a>
            </div>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center space-x-1">

                @if (!authService.isAuthenticated()) {
                <a routerLink="/" [routerLinkActiveOptions]="{exact: true}"
                    routerLinkActive="bg-secondary-maroon/80 text-accent-peach shadow-inner shadow-black/20"
                    class="px-3 py-2 rounded-md text-sm font-bold hover:bg-secondary-maroon transition-colors">Home</a>
                <a routerLink="/plans"
                    routerLinkActive="bg-secondary-maroon/80 text-accent-peach shadow-inner shadow-black/20"
                    class="px-3 py-2 rounded-md text-sm font-bold hover:bg-secondary-maroon transition-colors">Plans</a>

                <!-- Auth Area -->
                <div class="ml-4 border-l border-accent-nude/40 pl-4 flex items-center space-x-3">
                    <!-- Customer Link -->
                    <div class="flex items-center space-x-3 mr-4">
                        <a routerLink="/register"
                            class="bg-white text-primary-plum hover:bg-bg-blush px-4 py-1.5 rounded-md text-sm font-bold transition-colors">Customer</a>
                    </div>

                    <!-- Staff Links -->
                    <div class="flex items-center space-x-4 border-l border-white/20 pl-4">
                        <span class="text-xs text-accent-peach font-bold uppercase tracking-wider">Staff:</span>
                        <a routerLink="/login" [queryParams]="{role: 'Agent'}"
                            class="text-white hover:text-bg-blush text-sm font-bold transition-colors">Agent</a>
                        <a routerLink="/login" [queryParams]="{role: 'Admin'}"
                            class="text-white hover:text-bg-blush text-sm font-bold transition-colors">Admin</a>
                        <a routerLink="/login" [queryParams]="{role: 'ClaimsOfficer'}"
                            class="text-white hover:text-bg-blush text-sm font-bold transition-colors">Claims
                            Officer</a>
                    </div>
                </div>
                } @else {
                <!-- Logged in: show role: name format e.g. "Agent: John Doe" -->
                <div class="flex items-center gap-6">
                    <div class="flex flex-col items-end border-r border-white/20 pr-6">
                        <span
                            class="text-[10px] font-black text-accent-peach uppercase tracking-[0.2em] mb-0.5 opacity-80">
                            {{ authService.currentUserRole() || 'Staff' }}
                        </span>
                        <span class="text-sm font-bold text-white tracking-wide">
                            {{ authService.currentUserName() || 'Loading...' }}
                        </span>
                    </div>

                    <button (click)="authService.logout()"
                        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 border border-white/10 transition-all text-sm font-bold active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                        Log Out
                    </button>
                </div>
                }
            </div>
        </div>
    </div>
</nav>
